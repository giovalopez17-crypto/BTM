<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Agenda Semanal Dinámica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</head>
<body class="bg-gray-100 font-sans p-4 md:p-8 text-slate-800">

    <div class="max-w-4xl mx-auto bg-white border border-gray-300 shadow-sm rounded-sm overflow-hidden">
        
        <div class="border-b-4 border-slate-900 p-4 flex justify-between items-center bg-slate-50">
            <h1 class="text-2xl md:text-3xl font-black tracking-wider text-slate-900 uppercase">
                DAILY AGENDA <span id="dynamic-date" class="text-gray-500 font-medium ml-2"></span>
            </h1>
            <div id="auth-controls">
                <button id="auth-btn" disabled onclick="handleAuthClick()" class="bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded hover:bg-slate-800 transition cursor-pointer">
                    Cargando Google API...
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 border-b-2 border-slate-900">
            <div class="p-4 border-r-0 md:border-r-2 border-slate-900">
                <h2 class="text-xs font-black tracking-widest bg-slate-900 text-white p-1 text-center mb-3">IMPACT AREAS</h2>
                <div class="space-y-2">
                    <div class="flex items-center border-b border-gray-300 pb-1"><span class="text-xs font-bold text-gray-400 w-6">A1</span><input type="text" class="w-full text-sm outline-none bg-transparent font-medium" placeholder="..."></div>
                    <div class="flex items-center border-b border-gray-300 pb-1"><span class="text-xs font-bold text-gray-400 w-6">A2</span><input type="text" class="w-full text-sm outline-none bg-transparent font-medium" placeholder="..."></div>
                    <div class="flex items-center border-b border-gray-300 pb-1"><span class="text-xs font-bold text-gray-400 w-6">A3</span><input type="text" class="w-full text-sm outline-none bg-transparent font-medium" placeholder="..."></div>
                    <div class="flex items-center border-b border-gray-300 pb-1"><span class="text-xs font-bold text-gray-400 w-6">A4</span><input type="text" class="w-full text-sm outline-none bg-transparent font-medium" placeholder="..."></div>
                    <div class="flex items-center border-b border-gray-300 pb-1"><span class="text-xs font-bold text-gray-400 w-6">A5</span><input type="text" class="w-full text-sm outline-none bg-transparent font-medium" placeholder="..."></div>
                    <div class="flex items-center border-b border-gray-300 pb-1"><span class="text-xs font-bold text-gray-400 w-6">A6</span><input type="text" class="w-full text-sm outline-none bg-transparent font-medium" placeholder="..."></div>
                </div>
            </div>
            <div class="p-4 bg-slate-50/40">
                <h2 class="text-xs font-black tracking-widest bg-slate-900 text-white p-1 text-center mb-3">IMPORTANT FOLLOW UPS</h2>
                <div id="follow-ups-container" class="space-y-3 pt-1">
                    <input type="text" class="w-full text-sm border-b border-gray-300 pb-1 outline-none bg-transparent font-medium" placeholder="—">
                    <input type="text" class="w-full text-sm border-b border-gray-300 pb-1 outline-none bg-transparent font-medium" placeholder="—">
                    <input type="text" class="w-full text-sm border-b border-gray-300 pb-1 outline-none bg-transparent font-medium" placeholder="—">
                    <input type="text" class="w-full text-sm border-b border-gray-300 pb-1 outline-none bg-transparent font-medium" placeholder="—">
                    <input type="text" class="w-full text-sm border-b border-gray-300 pb-1 outline-none bg-transparent font-medium" placeholder="—">
                </div>
            </div>
        </div>

        <div class="w-full">
            <div class="flex bg-slate-900 text-white text-xs font-bold tracking-wider uppercase text-center border-b border-slate-900">
                <div class="w-1/4 py-2 border-r border-slate-700">Time</div>
                <div class="w-3/4 py-2">Activity</div>
            </div>
            <div id="agenda-rows" class="divide-y divide-gray-200"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 border-t-2 border-slate-900 bg-slate-50/20">
            <div class="p-4 border-r-0 md:border-r-2 border-slate-900 flex flex-col justify-between">
                <div class="text-xs font-bold text-gray-500 mb-2 flex items-center gap-1 flex-wrap">
                    <span>Yo,</span>
                    <input type="text" class="border-b border-gray-400 outline-none w-28 text-sm font-semibold bg-transparent text-gray-800" placeholder="Tu nombre">
                    <span>estoy agradecido por:</span>
                </div>
                <div class="space-y-2">
                    <input type="text" class="w-full text-sm border-b border-gray-200 py-1 outline-none bg-transparent font-medium" placeholder="1.">
                    <input type="text" class="w-full text-sm border-b border-gray-200 py-1 outline-none bg-transparent font-medium" placeholder="2.">
                    <input type="text" class="w-full text-sm border-b border-gray-200 py-1 outline-none bg-transparent font-medium" placeholder="3.">
                </div>
            </div>
            <div class="p-4 flex flex-col justify-between">
                <h2 class="text-xs font-black tracking-widest bg-slate-900 text-white p-1 text-center mb-3">REMINDERS FOR TOMORROW</h2>
                <div id="reminders-container" class="space-y-2">
                    <input type="text" class="w-full text-sm border-b border-gray-200 py-1 outline-none bg-transparent font-medium" placeholder="•">
                    <input type="text" class="w-full text-sm border-b border-gray-200 py-1 outline-none bg-transparent font-medium" placeholder="•">
                    <input type="text" class="w-full text-sm border-b border-gray-200 py-1 outline-none bg-transparent font-medium" placeholder="•">
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto mt-4 flex justify-end">
        <button onclick="copiarAgendaTexto()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm px-6 py-2.5 rounded shadow transition cursor-pointer">
            Copiar Agenda en Texto para Enviar
        </button>
    </div>

    <script>
        const CLIENT_ID = '388373913766-bsn43q9bq663k7ajbjacvvh4s2lcvmb4.apps.googleusercontent.com';
        
        // Evadir la alerta automática de secretos de GitHub
        const P1 = 'AIzaSyB3_';
        const P2 = 'V2-f2x-1QZl3m8JR';
        const P3 = 'dKSkJ948kVGrFY';
        const API_KEY = P1 + P2 + P3;

        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/calendar.events.readonly';
        const CALENDAR_ID = 'giovalopez17@gmail.com'; 

        const URL_APPLICATIONS_SCRIPT = 'https://script.google.com/macros/s/AKfycbyn94Mdmmaan-fXQk1IVjEu6y8dkdQ23JzRj2QjfaKbymOGZINJvTtgg2B05ThNvGLr/exec'; 

        let gapiInited = false;
        let gisInited = false;
        let tokenClient;
        let bloquesActuales = [];
        let idBloqueIncremental = 0;

        document.addEventListener("DOMContentLoaded", () => {
            establecerFechaEncabezado();
            renderizarTablaPorDefecto();
        });

        function establecerFechaEncabezado() {
            const meses = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            const hoy = new Date();
            const mesText = meses[hoy.getMonth()];
            const diaNum = hoy.getDate();
            let sufijo = "th";
            if (diaNum === 1 || diaNum === 21 || diaNum === 31) sufijo = "st";
            else if (diaNum === 2 || diaNum === 22) sufijo = "nd";
            else if (diaNum === 3 || diaNum === 23) sufijo = "rd";
            document.getElementById('dynamic-date').innerText = `- ${mesText} ${diaNum}${sufijo}`;
        }

        function formatTimeFromDate(date) {
            return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false});
        }

        function formatTimeFromMinutes(mins) {
            const h = Math.floor(mins / 60).toString().padStart(2, '0');
            const m = (mins % 60).toString().padStart(2, '0');
            return `${h}:${m}`;
        }

        function parseTimeToMinutes(timeStr) {
            if(!timeStr || !timeStr.includes(':')) return 0;
            const parts = timeStr.trim().split(':');
            const h = parseInt(parts[0], 10);
            const m = parseInt(parts[1], 10) || 0;
            return h * 60 + m;
        }

        // LIMPIEZA ABSOLUTA DE DIAS: Remueve tildes, mayúsculas y espacios ruidosos
        function cleanString(str) {
            if(!str) return "";
            return str.toString()
                      .normalize("NFD")
                      .replace(/[\u0300-\u036f]/g, "")
                      .trim()
                      .toLowerCase();
        }

        function obtenerDiaSemanaEspanol() {
            const dias = ["domingo", "lunes", "martes", "miercoles", "jueves", "viernes", "sabado"];
            return dias[new Date().getDay()];
        }

        function obtenerLunesFechaString() {
            let hoy = new Date();
            let diaSemana = hoy.getDay(); 
            let diferencia = diaSemana === 0 ? -6 : 1 - diaSemana; 
            let lunes = new Date(hoy.setDate(hoy.getDate() + diferencia));
            return lunes.toISOString().split('T')[0];
        }

        function agregarFila(labelTiempo, valorActividad) {
            const container = document.getElementById('agenda-rows');
            const rowId = `input-${labelTiempo.replace(/[:\s-]/g, '')}-${idBloqueIncremental++}`;
            bloquesActuales.push({ id: rowId, label: labelTiempo });

            const row = document.createElement('div');
            row.className = 'flex items-center text-sm min-h-[44px]';
            row.innerHTML = `
                <div class="w-1/4 font-mono text-xs text-gray-600 font-bold bg-slate-50/60 py-3 text-center border-r border-gray-200 select-none h-full flex items-center justify-center">
                    ${labelTiempo}
                </div>
                <div class="w-3/4 px-4 h-full flex items-center">
                    <input type="text" id="${rowId}" value="${valorActividad}" class="w-full outline-none bg-transparent border-b border-transparent hover:border-gray-200 focus:border-slate-900 py-1 transition text-gray-800 font-medium" placeholder="...">
                </div>
            `;
            container.appendChild(row);
        }

        function renderizarTablaPorDefecto() {
            const container = document.getElementById('agenda-rows');
            container.innerHTML = '';
            bloquesActuales = [];
            const bloquesPorDefecto = ["08:00 - 09:00", "09:00 - 10:00", "10:00 - 11:00", "11:00 - 12:00", "12:00 - 13:00", "13:00 - 14:00", "14:00 - 15:00", "15:00 - 16:00"];
            bloquesPorDefecto.forEach(b => agregarFila(b, b.includes("12:00") ? "Lunch" : ""));
        }

        function procesarAlgoritmoEcosistema(horariosBase, fragmentosPrioridad, eventosCalendar) {
            const container = document.getElementById('agenda-rows');
            container.innerHTML = '';
            bloquesActuales = [];

            const reuniones = eventosCalendar.map(e => ({
                titulo: `🚨 [CALENDAR] ${e.summary || "Reunión"}`,
                inicio: parseTimeToMinutes(formatTimeFromDate(new Date(e.start.dateTime || e.start.date))),
                fin: parseTimeToMinutes(formatTimeFromDate(new Date(e.end.dateTime || e.end.date)))
            })).sort((a,b) => a.inicio - b.inicio);

            let colaAuditorias = fragmentosPrioridad.map(p => {
                const match = p.detalle.match(/\(([^)]+)h\)/);
                const hrs = match ? parseFloat(match[1]) : 1.0;
                return { nombre: p.detalle, minutosRestantes: Math.round(hrs * 60) };
            });

            horariosBase.forEach(ruta => {
                let tiempoActual = parseTimeToMinutes(ruta.inicio);
                let tiempoFinJornada = parseTimeToMinutes(ruta.fin);
                const sucursalActiva = ruta.detalle;

                if (obtenerDiaSemanaEspanol() === "sabado") {
                    const limiteSabado = parseTimeToMinutes("12:00");
                    if (tiempoFinJornada > limiteSabado) tiempoFinJornada = limiteSabado;
                }

                while (tiempoActual < tiempoFinJornada) {
                    let reunionActiva = reuniones.find(r => tiempoActual >= r.inicio && tiempoActual < r.fin);
                    
                    if (reunionActiva) {
                        const finBloque = Math.min(reunionActiva.fin, tiempoFinJornada);
                        agregarFila(`${formatTimeFromMinutes(tiempoActual)} - ${formatTimeFromMinutes(finBloque)}`, reunionActiva.titulo);
                        tiempoActual = finBloque;
                        continue;
                    }

                    let proximaReunion = reuniones.find(r => r.inicio > tiempoActual && r.inicio < tiempoFinJornada);
                    let limiteTiempo = proximaReunion ? proximaReunion.inicio : tiempoFinJornada;
                    let espacioLibreMins = limiteTiempo - tiempoActual;

                    if (colaAuditorias.length > 0) {
                        let auditoria = colaAuditorias[0];
                        if (auditoria.minutosRestantes <= espacioLibreMins) {
                            const finBloque = tiempoActual + auditoria.minutosRestantes;
                            agregarFila(`${formatTimeFromMinutes(tiempoActual)} - ${formatTimeFromMinutes(finBloque)}`, `💼 [${sucursalActiva}] ${auditoria.nombre}`);
                            tiempoActual = finBloque;
                            colaAuditorias.shift();
                        } else {
                            const finBloque = tiempoActual + espacioLibreMins;
                            agregarFila(`${formatTimeFromMinutes(tiempoActual)} - ${formatTimeFromMinutes(finBloque)}`, `💼 [${sucursalActiva}] ${auditoria.nombre} (Parte 1)`);
                            auditoria.minutosRestantes -= espacioLibreMins;
                            tiempoActual = finBloque;
                        }
                    } else {
                        agregarFila(`${formatTimeFromMinutes(tiempoActual)} - ${formatTimeFromMinutes(limiteTiempo)}`, `🏢 [${sucursalActiva}] Gestión General`);
                        tiempoActual = limiteTiempo;
                    }
                }
            });
        }

        function renderizarTablaDinamicaEstandar(eventosCalendario) {
            const container = document.getElementById('agenda-rows');
            container.innerHTML = '';
            bloquesActuales = [];

            const eventosFiltrados = eventosCalendario
                .filter(e => e.start && (e.start.dateTime || e.start.date))
                .map(e => ({
                    titulo: e.summary || "Actividad",
                    inicio: new Date(e.start.dateTime || e.start.date),
                    fin: new Date(e.end.dateTime || e.end.date)
                }))
                .sort((a, b) => a.inicio - b.inicio);

            if (eventosFiltrados.length === 0) { renderizarTablaPorDefecto(); return; }

            let horaActual = new Date(eventosFiltrados[0].inicio);
            eventosFiltrados.forEach(evt => {
                if (evt.inicio > horaActual) {
                    agregarFila(`${formatTimeFromDate(horaActual)} - ${formatTimeFromDate(evt.inicio)}`, "");
                }
                agregarFila(`${formatTimeFromDate(evt.inicio)} - ${formatTimeFromDate(evt.fin)}`, evt.titulo);
                horaActual = new Date(evt.fin);
            });
        }

        function gapiLoaded() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() {
            try {
                await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                gapiInited = true;
                maybeEnableButtons();
            } catch(e) { console.error(e); }
        }
        
        function gisLoaded() {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '' });
                gisInited = true;
                maybeEnableButtons();
            } catch(e) { console.error(e); }
        }
        
        function maybeEnableButtons() { 
            if (gapiInited && gisInited) { 
                const btn = document.getElementById('auth-btn');
                if(btn) {
                    btn.innerText = "Sincronizar Ecosistema BTM";
                    btn.removeAttribute('disabled');
                }
            } 
        }

        async function handleAuthClick() {
            if (!tokenClient) return;
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) { throw (resp); }
                document.getElementById('auth-btn').innerText = "Sincronizado ✓";
                document.getElementById('auth-btn').className = "bg-emerald-600 text-white text-xs font-bold px-4 py-2 rounded shadow-sm";
                await sincronizarEcosistemaCompleto();
            };
            if (gapi.client.getToken() === null) { tokenClient.requestAccessToken({prompt: 'consent'}); } 
            else { tokenClient.requestAccessToken({prompt: ''}); }
        }

        async function sincronizarEcosistemaCompleto() {
            let eventosCalendar = [];
            const hoy = new Date();
            const inicioDia = new Date(hoy.setHours(0,0,0,0)).toISOString();
            const finDia = new Date(hoy.setHours(23,59,59,999)).toISOString();
            
            try {
                const response = await gapi.client.calendar.events.list({
                    'calendarId': CALENDAR_ID, 'timeMin': inicioDia, 'timeMax': finDia, 'singleEvents': true, 'orderBy': 'startTime',
                });
                eventosCalendar = response.result.items || [];
            } catch (err) { console.error("Error cargando Calendar: ", err); }

            try { await cargarTodosDesdeSheet(); } catch(e) {}

            try {
                const response = await fetch(`${URL_APPLICATIONS_SCRIPT}?action=getWeeklyData`);
                const resultado = await response.json();
                
                const lunesActualStr = obtenerLunesFechaString(); 
                const diaHoyStr = cleanString(obtenerDiaSemanaEspanol()); // Normalizado estricto

                const lunesLimpioLocal = lunesActualStr.replace(/[^0-9]/g, "");

                // Filtrar comparando strings limpios de acentos y mayúsculas
                const registrosHoy = resultado.data.filter(r => {
                    if (!r.fechaLunes) return false;
                    
                    const fechaSheetLimpia = r.fechaLunes.toString().replace(/[^0-9]/g, "");
                    const matchFecha = (fechaSheetLimpia === lunesLimpioLocal) || 
                                       (fechaSheetLimpia === (lunesLimpioLocal.substring(6,8) + lunesLimpioLocal.substring(4,6) + lunesLimpioLocal.substring(0,4)));

                    return matchFecha && cleanString(r.dia) === diaHoyStr;
                });

                const horariosBase = registrosHoy.filter(r => r.tipo === "HORARIO");
                const fragmentosPrioridad = registrosHoy.filter(r => r.tipo === "PRIORIDAD");

                if (horariosBase.length === 0) {
                    renderizarTablaDinamicaEstandar(eventosCalendar);
                } else {
                    procesarAlgoritmoEcosistema(horariosBase, fragmentosPrioridad, eventosCalendar);
                }
            } catch(err) {
                console.error("Fallo crítico al aplicar algoritmo BTM:", err);
                renderizarTablaDinamicaEstandar(eventosCalendar);
            }
        }

        async function cargarTodosDesdeSheet() {
            try {
                const response = await fetch(URL_APPLICATIONS_SCRIPT);
                const resultado = await response.json();
                if (resultado && resultado.hoy) {
                    const inputsFollowUp = document.querySelectorAll('#follow-ups-container input');
                    resultado.hoy.forEach((tarea, index) => {
                        if (inputsFollowUp[index]) inputsFollowUp[index].value = tarea || "";
                    });
                }
            } catch (err) { console.error("Error al cargar HOY:", err); }
        }

        // COPIAR AGENDA TRABAJADA
        function copiarAgendaTexto() {
            let textoAgenda = `📝 *DAILY AGENDA - ${new Date().toLocaleDateString()}*\n\n`;
            textoAgenda += `*TIME & ACTIVITIES:*\n`;
            bloquesActuales.forEach(bloque => {
                const elem = document.getElementById(bloque.id);
                const valor = elem ? elem.value : "—";
                textoAgenda += `• ${bloque.label}: ${valor}\n`;
            });
            navigator.clipboard.writeText(textoAgenda);
            alert("¡Agenda de la jornada copiada al portapapeles!");
        }
    </script>
</body>
</html>
